<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css"
    integrity="sha512-xodZBNTC5n17Xt2atTPuE1HxjVMSvLVW9ocqUKLsCC5CXdbqCmblAshOMAS6/keqq/sMZMZ19scR4PsZChSR7A=="
    crossorigin=""/>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"
    integrity="sha512-XQoYMqMTK8LvdxXYG3nZ448hOEQiglfqkJs1NOQV44cWnUrBc8PkAOcXy20w0vlaXaVUearIOBhiXZ5V3ynxwA=="
    crossorigin=""></script>

    <title>JSON-kokeiluja....</title>
</head>

<style>
    table, tr, td {
        border: 1px solid black;
    }

    #mapid { height: 500px; }

</style>

<body>
    
<div id="weather"></div>
<div id="mapid"></div>
<div id="pyorat"></div>

<label>Valitse pyöräasema:</label>

<select id="pyoratvalikko" data-value="x" onchange="pyorafunktio(this, event)">
</select> 

<script>

    const mymap = L.map('mapid').setView([60.192059,24.945831], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(mymap);

    async function naytaTyontekijat() {
        try {
            const vastaus = await fetch('https://services1.arcgis.com/sswNXkUiRoWtrx0t/arcgis/rest/services/Helsingin_ja_Espoon_kaupunkipy%C3%B6r%C3%A4asemat/FeatureServer/0/query?where=1%3D1&outFields=*&outSR=4326&f=json');
            const vastaus_weather = await fetch('https://api.openweathermap.org/data/2.5/weather?q=Helsinki&lang=fi&units=metric&appid=114332134ea7ed53cb7a0e88a863eb5d');

            if (!vastaus.ok || !vastaus_weather.ok) throw new Error('jokin meni pieleen');
            // Jos tapahtuu virhe, heitetään ilmoitus
            const pyorat = await vastaus.json(); // JSON:sta taulukko
           // console.log(pyorat.features[120])
           const saatila = await vastaus_weather.json();

           console.log(saatila.coord.lon)

           let saa_kentta = document.getElementById("weather");

           let url = 'https://openweathermap.org/img/w/'+ saatila.weather[0].icon +'.png'
            let elem = document.getElementById("weather")
           elem = document.createElement("img");
        elem.setAttribute("src", url);
       // elem.setAttribute("height", "40");
        //elem.setAttribute("width", "120");
        elem.setAttribute("alt", "sääkuva");
       

           saa_kentta.innerHTML =  '<img src='+url+' alt="sääkuva">'  + "Tuulen nopeus: " +saatila.wind.speed + ", Tuulen suunta: " + saatila.wind.deg + 
           ", sään kuvaus: "  + saatila.weather[0].description + ", kosteus: " + saatila.main.humidity +
           ", asteet: " + saatila.main.temp + " celciusta"
            

            pituus = Object.keys(pyorat.features).length
            console.log(pituus)

            let label = document.createElement("label")

            let select = document.createElement("select");
            select.setAttribute("id", "pyoratvalikko")


            for (let i=0; i<pituus; i++) {
            let valikko = document.getElementById("pyoratvalikko")
             let option = document.createElement("option");
             //option.value = pyorat.features[i].features;
             let geometry = JSON.stringify(pyorat.features[i].geometry)
            // option.value = geometry
            // option.value = pyorat.features[i].geometry
            //option.name = pyorat.features[i].geometry.x
            option.value = [pyorat.features[i].geometry.x, pyorat.features[i].geometry.y, pyorat.features[i].attributes.ID, 
            pyorat.features[i].attributes.Kapasiteet, pyorat.features[i].attributes.Nimi]


            

    
                option.innerHTML = pyorat.features[i].attributes.Osoite;
                //cellB.innerHTML = pyorat.features[i].attributes.Kapasiteet

                valikko.appendChild(option);

            }

        } catch (error) {
            // Otetaan heitetty virheilmoitus kiinni
            console.log(error)

        }
    }
    function pyorafunktio(select, event) {   
    //console.log(event.target.value[1]);
    let x = event.target.value.split(",")
    console.log(x)

   /* if(marker != undefined){
    mymap.removeLayer(marker)
    }*/

    let marker = L.marker([x[1],x[0]]).addTo(mymap)
    mymap.addLayer(marker);
    marker.bindPopup( "Nimi: " + x[4] + ", kapasiteetti: " + x[3]).openPopup()

} 

    naytaTyontekijat();
</script>

</body>
</html>
